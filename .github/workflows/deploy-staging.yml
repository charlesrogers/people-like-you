name: Deploy Staging
on:
  push:
    branches: [staging]
    paths-ignore: ['*.md', 'docs/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/charlesrogers/people-like-you-app:staging
            ghcr.io/charlesrogers/people-like-you-app:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Staging
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://95.216.205.160:8000/api/v1/deploy?uuid=lnqcrc8fr4bmge7200f4pc2l&force=true"
