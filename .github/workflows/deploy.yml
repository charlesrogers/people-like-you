name: Deploy
on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/charlesrogers/people-like-you:latest
            ghcr.io/charlesrogers/people-like-you:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Make package public
        run: |
          curl -sf -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/user/packages/container/people-like-you" \
            -d '{"visibility":"public"}' || true
      - name: Deploy
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://95.216.205.160:8000/api/v1/deploy?uuid=v62x9o7lxfncksjq5jrgevcc&force=true"
