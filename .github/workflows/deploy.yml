name: Deploy
on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', 'specs/**', 'tasks/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Get previous SHA for rollback
        id: prev
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/charlesrogers/people-like-you-app:latest
            ghcr.io/charlesrogers/people-like-you-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run database migrations
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 95.216.205.160 >> ~/.ssh/known_hosts 2>/dev/null

          # Run each migration file that hasn't been applied
          for f in $(ls migrations/*.sql 2>/dev/null | sort); do
            NAME=$(basename "$f")
            # Check if already applied
            APPLIED=$(ssh root@95.216.205.160 "docker exec supabase-db psql -U postgres -d postgres -t -c \"SELECT 1 FROM _migrations WHERE name='$NAME'\"" 2>/dev/null | tr -d ' ')
            if [ "$APPLIED" = "1" ]; then
              echo "Skip: $NAME (already applied)"
              continue
            fi
            echo "Applying: $NAME"
            # Run migration (each statement on its own line)
            ssh root@95.216.205.160 "docker exec -i supabase-db psql -U postgres -d postgres" < "$f" 2>&1 || echo "Warning: $NAME had errors (may be IF NOT EXISTS)"
            # Mark as applied
            ssh root@95.216.205.160 "docker exec supabase-db psql -U postgres -d postgres -c \"INSERT INTO _migrations (name) VALUES ('$NAME') ON CONFLICT DO NOTHING\"" 2>/dev/null
          done
          echo "Migrations complete"

      - name: Deploy, verify, rollback if needed
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          APP_UUID: v62x9o7lxfncksjq5jrgevcc
          HEALTH_URL: https://people-like-you.com/api/health
          PREV_SHA: ${{ steps.prev.outputs.sha }}
          DISCORD_WEBHOOK: https://discord.com/api/webhooks/1486969921542946887/SAD4fP0-JaPrGmnEs_W2WIZmiRMQt1T2kQSbgnNenTTjnRq0YcqNkkLsKdvyPJ5pAA6y
        run: |
          # 1. Trigger deploy
          curl -sf -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "http://95.216.205.160:8000/api/v1/deploy?uuid=$APP_UUID&force=true"
          echo "Deploy triggered"

          # 2. Poll health (20 attempts × 10s = ~3 min)
          HEALTHY=false
          for i in $(seq 1 20); do
            sleep 10
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            echo "Health check $i/20: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              HEALTHY=true
              break
            fi
          done

          if [ "$HEALTHY" = "true" ]; then
            echo "Deploy verified healthy"
            exit 0
          fi

          # 3. Rollback
          echo "::error::Health check failed — rolling back to $PREV_SHA"
          curl -sf -X PATCH \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\": \"$PREV_SHA\"}" \
            "http://95.216.205.160:8000/api/v1/applications/$APP_UUID"
          curl -sf -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "http://95.216.205.160:8000/api/v1/deploy?uuid=$APP_UUID&force=true"
          sleep 30

          # Reset tag back to latest for future deploys
          curl -sf -X PATCH \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"docker_registry_image_tag": "latest"}' \
            "http://95.216.205.160:8000/api/v1/applications/$APP_UUID"

          # 4. Alert Discord
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"**ROLLBACK** ${GITHUB_REPOSITORY}: deploy \`${GITHUB_SHA:0:7}\` failed health check. Rolled back to \`${PREV_SHA:0:7}\`. <https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}>\"}" \
            "$DISCORD_WEBHOOK" || true
          exit 1
