<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#1a1a1a"/>
  <!-- Shift whole group ~15px right for optical centering (Y's right arm is lighter) -->
  <g transform="translate(15, 0)">
    <!-- L (white, italic) — rendered first, tucked under P -->
    <text x="225" y="355" text-anchor="middle" font-family="Futura, Century Gothic, sans-serif" font-weight="800" font-size="280" fill="#ffffff" font-style="italic">L</text>
    <!-- P (neon yellow) — overlaps L from left, with drop shadow -->
    <text x="150" y="355" text-anchor="middle" font-family="Futura, Century Gothic, sans-serif" font-weight="800" font-size="280" fill="#d4ff00" filter="url(#dropShadow)">P</text>
    <!-- Y (neon yellow) — overlaps L from right, with drop shadow -->
    <text x="340" y="355" text-anchor="middle" font-family="Futura, Century Gothic, sans-serif" font-weight="800" font-size="280" fill="#d4ff00" filter="url(#dropShadow)">Y</text>
  </g>
</svg>
